<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Silver Haven - Checkout</title>
  <link href="css/styles.css" rel="stylesheet">
</head>
<body onload="initShippingPage()">
<div id="wrapper">
  <header>
      <h1>The Silver Haven</h1>
  </header>
  
  <nav class="navbar">
    <ul> 
      <li><a href="index.html">Home</a></li>
      <li><a href="cart.html">Back to Cart</a></li>
    </ul>
  </nav>

  <main class="container shipping-layout">
    <section class="shipping-card">
      <h2>Checkout Information</h2>
      <form id="shipping-form">
        <fieldset>
          <legend>Billing Information</legend>
          <label for="billName">Full Name</label>
          <input type="text" id="billName" required placeholder="John Doe">

          <label for="billAddress">Street Address</label>
          <input type="text" id="billAddress" required>

          <label for="billCity">City</label>
          <input type="text" id="billCity" required>

          <label for="billState">State (2 Letters)</label>
          <input type="text" id="billState" required maxlength="2">

          <label for="billZip">Zip Code (5 Digits)</label>
          <input type="text" id="billZip" required maxlength="5">
        </fieldset>

        <p style="margin-top: 15px;">
          <input type="checkbox" id="sameAsBilling" onclick="copyBillingAddress()">
          <label for="sameAsBilling" style="display:inline;">My shipping address is the same as billing</label>
        </p>

        <fieldset id="shipping-section">
          <legend>Shipping Information</legend>
          <label for="fullName">Recipient Name</label>
          <input type="text" id="fullName" required>

          <label for="address">Street Address</label>
          <input type="text" id="address" required>

          <label for="city">City</label>
          <input type="text" id="city" required>

          <label for="state">State</label>
          <input type="text" id="state" required maxlength="2">

          <label for="zipCode">Zip Code</label>
          <input type="text" id="zipCode" required maxlength="5">
        </fieldset>

        <button type="submit" class="action-button primary-button" style="width:100%; margin-top:20px;">Place Simulated Order</button>
      </form>

      <div id="shipping-message"></div>
    </section>

    <section class="summary-card">
      <h2>Order Summary</h2>
      <div id="shipping-summary"></div>
    </section>
  </main>

  <footer>
    Copyright &copy; 2024 WebMaster
  </footer>
</div>

<script src="js/scripts.js"></script>
</body>
</html>
